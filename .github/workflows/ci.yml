# CI: перевірка коду під час push у репозиторій (та в pull request).
name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Встановлення залежностей
        run: npm ci
      - name: Перевірка типів
        run: npm run typecheck
      - name: Тести розстановки (vitest)
        run: npm test
      - name: Продакшн-збірка
        run: npm run build
